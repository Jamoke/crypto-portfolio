apiVersion: 1

# SQLite datasources for the polymarket service's two databases.
# The volume polymarket_db is mounted read-only into the grafana
# container at /var/lib/grafana/sqlite/polymarket/ — see docker-compose.yml.
#
# Requires the frser-sqlite-datasource plugin, installed via
# GF_INSTALL_PLUGINS=frser-sqlite-datasource on the grafana service.

datasources:
  # Phase A/B — whale roster + simulated positions
  - name: Polymarket SQLite
    type: frser-sqlite-datasource
    uid: polymarket-sqlite
    access: proxy
    editable: true
    jsonData:
      path: /var/lib/grafana/sqlite/polymarket/polymarket.db

  # Phase C — Brier / reliability inputs
  - name: Polymarket Calibration SQLite
    type: frser-sqlite-datasource
    uid: polymarket-calibration-sqlite
    access: proxy
    editable: true
    jsonData:
      path: /var/lib/grafana/sqlite/polymarket/calibration.db
