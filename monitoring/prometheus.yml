global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "freqtrade"
    static_configs:
      - targets: ["freqtrade:8080"]
    metrics_path: /api/v1/health

  - job_name: "freqtrade_scalp"
    static_configs:
      - targets: ["freqtrade_scalp:8081"]
    metrics_path: /api/v1/health

  # Redis does not speak HTTP — monitor it via the asset_governor /health endpoint instead.
  # Scraping redis:6379 directly triggers Redis's cross-protocol attack detection.

  - job_name: "asset_governor"
    static_configs:
      - targets: ["asset_governor:8090"]
    metrics_path: /health

  - job_name: "tv_bridge"
    static_configs:
      - targets: ["tv_bridge:8443"]
    metrics_path: /health
