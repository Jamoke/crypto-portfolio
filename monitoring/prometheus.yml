global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "freqtrade"
    static_configs:
      - targets: ["freqtrade:8080"]
    metrics_path: /api/v1/health

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]

  - job_name: "asset_governor"
    static_configs:
      - targets: ["asset_governor:8090"]
    metrics_path: /health

  - job_name: "tv_bridge"
    static_configs:
      - targets: ["tv_bridge:8443"]
    metrics_path: /health
