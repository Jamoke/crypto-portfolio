global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # freqtrade bots are scraped via freqtrade_exporter (see below) — their
  # /api/v1/health endpoints return JSON, not Prometheus format.
  # asset_governor /health and tv_bridge /health are also JSON-only.
  # All Prometheus metrics come from the dedicated exporter services.

  - job_name: "defi_executor"
    static_configs:
      - targets: ["defi_executor:8091"]
    metrics_path: /metrics

  - job_name: "freqtrade_exporter"
    static_configs:
      - targets: ["freqtrade_exporter:9101"]
    metrics_path: /metrics

  - job_name: "asset_governor_metrics"
    static_configs:
      - targets: ["asset_governor:8090"]
    metrics_path: /metrics

  - job_name: "claude_analyst_metrics"
    static_configs:
      - targets: ["claude_analyst:9102"]
    metrics_path: /metrics

  - job_name: "backtest_publisher"
    static_configs:
      - targets: ["backtest_publisher:9105"]
    metrics_path: /metrics

  - job_name: "polymarket"
    static_configs:
      - targets: ["polymarket:9104"]
    metrics_path: /metrics
