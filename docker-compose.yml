version: "3.9"

# ============================================================
#  Crypto Portfolio — Docker Compose
#  All services run on Raspberry Pi 5 (8GB)
# ============================================================

services:

  # ----------------------------------------------------------
  # Freqtrade — Strategy & signal engine (DRY-RUN mode)
  # Generates buy/sell signals; DeFi executor handles actual trades
  # ----------------------------------------------------------
  freqtrade:
    image: freqtradeorg/freqtrade:stable
    container_name: freqtrade
    restart: unless-stopped
    volumes:
      - ./freqtrade/user_data:/freqtrade/user_data
      - ./freqtrade/strategies:/freqtrade/user_data/strategies
      - ./freqtrade/config.json:/freqtrade/config.json
      - ./freqtrade/entrypoint.sh:/entrypoint.sh
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    command: ["MomentumStrategy"]
    environment:
      - TZ=${TIMEZONE:-America/Los_Angeles}
      - FREQTRADE_USERNAME=${FREQTRADE_USERNAME:-admin}
      - FREQTRADE_PASSWORD=${FREQTRADE_PASSWORD}
      - FREQTRADE_JWT_SECRET=${FREQTRADE_JWT_SECRET}
      - FREQTRADE_WS_TOKEN=${FREQTRADE_WS_TOKEN}
      - PI_LOCAL_IP=${PI_LOCAL_IP:-localhost}
    ports:
      - "8080:8080"
    depends_on:
      - redis
    networks:
      - portfolio_net

  # ----------------------------------------------------------
  # Freqtrade Recovery Bot — Recovery/ranging momentum strategy
  # Catches early recovery phase before golden cross forms
  # Same pairs as MomentumStrategy, port 8083
  # ----------------------------------------------------------
  freqtrade_recovery:
    image: freqtradeorg/freqtrade:stable
    container_name: freqtrade_recovery
    restart: unless-stopped
    volumes:
      - ./freqtrade/user_data:/freqtrade/user_data
      - ./freqtrade/strategies:/freqtrade/user_data/strategies
      - ./freqtrade/config_recovery.json:/freqtrade/config.json
      - ./freqtrade/entrypoint.sh:/entrypoint.sh
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    command: ["RecoveryMomentumStrategy"]
    environment:
      - TZ=${TIMEZONE:-America/Los_Angeles}
      - FREQTRADE_USERNAME=${FREQTRADE_USERNAME:-admin}
      - FREQTRADE_PASSWORD=${FREQTRADE_PASSWORD}
      - FREQTRADE_RECOVERY_JWT_SECRET=${FREQTRADE_RECOVERY_JWT_SECRET}
      - FREQTRADE_RECOVERY_WS_TOKEN=${FREQTRADE_RECOVERY_WS_TOKEN}
      - PI_LOCAL_IP=${PI_LOCAL_IP:-localhost}
    ports:
      - "8083:8083"
    depends_on:
      - redis
    networks:
      - portfolio_net

  # ----------------------------------------------------------
  # Freqtrade Scalp Bot — High-frequency 5m strategy
  # Separate instance, isolated $1000 dry-run wallet, port 8081
  # Pairs: SOL, ADA, LTC, DOGE, LINK, POL, SAND
  # ----------------------------------------------------------
  freqtrade_scalp:
    image: freqtradeorg/freqtrade:stable
    container_name: freqtrade_scalp
    restart: unless-stopped
    volumes:
      - freqtrade_scalp_data:/freqtrade/user_data
      - ./freqtrade/strategies:/freqtrade/user_data/strategies
      - ./freqtrade/config_scalp.json:/freqtrade/config.json
      - ./freqtrade/entrypoint.sh:/entrypoint.sh
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    command: ["ScalpStrategy"]
    environment:
      - TZ=${TIMEZONE:-America/Los_Angeles}
      - FREQTRADE_USERNAME=${FREQTRADE_USERNAME:-admin}
      - FREQTRADE_PASSWORD=${FREQTRADE_PASSWORD}
      - FREQTRADE_SCALP_JWT_SECRET=${FREQTRADE_SCALP_JWT_SECRET}
      - FREQTRADE_SCALP_WS_TOKEN=${FREQTRADE_SCALP_WS_TOKEN}
      - PI_LOCAL_IP=${PI_LOCAL_IP:-localhost}
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - portfolio_net

  # ----------------------------------------------------------
  # Redis — Lightweight message queue between services
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    networks:
      - portfolio_net

  # ----------------------------------------------------------
  # Claude Analyst — AI market analysis every 8 hours (3x/day)
  # Reads signals from Redis, writes analysis back
  # ----------------------------------------------------------
  claude_analyst:
    build: ./services/claude_analyst
    container_name: claude_analyst
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - COINGECKO_API_KEY=${COINGECKO_API_KEY:-}
      - LUNARCRUSH_API_KEY=${LUNARCRUSH_API_KEY:-}
      - REDIS_URL=redis://redis:6379
      - TZ=${TIMEZONE:-America/Los_Angeles}
    volumes:
      - ./config:/app/config:ro
      - analyst_logs:/app/logs
    ports:
      - "9102:9102"   # Prometheus metrics (prediction accuracy)
    depends_on:
      - redis
    networks:
      - portfolio_net

  # ----------------------------------------------------------
  # Asset Governor — Enforces allowlist and allocation limits
  # All other services query it before acting
  # ----------------------------------------------------------
  asset_governor:
    build: ./services/asset_governor
    container_name: asset_governor
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      - FREQTRADE_URL=http://freqtrade:8080
      - FREQTRADE_SCALP_URL=http://freqtrade_scalp:8081
      - FREQTRADE_USERNAME=${FREQTRADE_USERNAME:-admin}
      - FREQTRADE_PASSWORD=${FREQTRADE_PASSWORD}
    volumes:
      - ./config:/app/config:ro
    ports:
      - "8090:8090"   # Internal REST API
    depends_on:
      - redis
    networks:
      - portfolio_net

  # ----------------------------------------------------------
  # TradingView Bridge — Webhook listener for TV alerts
  # Exposes port 8443 for incoming webhook POSTs
  # ----------------------------------------------------------
  tv_bridge:
    build: ./services/tv_bridge
    container_name: tv_bridge
    restart: unless-stopped
    environment:
      - TV_WEBHOOK_SECRET=${TV_WEBHOOK_SECRET}
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./config:/app/config:ro
    ports:
      - "8443:8443"   # TradingView posts here
    depends_on:
      - redis
    networks:
      - portfolio_net

  # ----------------------------------------------------------
  # DeFi Executor — Translates signals to on-chain transactions
  # Polygon + Arbitrum via 1inch aggregator
  # Phase 1: runs in simulation mode (no real transactions)
  # ----------------------------------------------------------
  defi_executor:
    build: ./services/defi_executor
    container_name: defi_executor
    restart: unless-stopped
    environment:
      - WALLET_ADDRESS=${WALLET_ADDRESS}
      - WALLET_PRIVATE_KEY=${WALLET_PRIVATE_KEY}   # required for live mode
      - POLYGON_RPC_URL=${POLYGON_RPC_URL}
      - ARBITRUM_RPC_URL=${ARBITRUM_RPC_URL}
      - ONEINCH_API_KEY=${ONEINCH_API_KEY:-}
      - REDIS_URL=redis://redis:6379
      - SIMULATION_MODE=${SIMULATION_MODE:-true}   # flip to false for live trading
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - DIGEST_RECIPIENT=${DIGEST_RECIPIENT}
      - TZ=${TIMEZONE:-America/Chicago}
    volumes:
      - ./config:/app/config:ro
      - executor_logs:/app/logs
      - trade_db:/app/data           # SQLite trade database (persistent)
    ports:
      - "8091:8091"                  # Metrics + trade API
    depends_on:
      - redis
      - asset_governor
    networks:
      - portfolio_net

  # ----------------------------------------------------------
  # Email Digest — Daily summary + approval system
  # ----------------------------------------------------------
  email_digest:
    build: ./services/email_digest
    container_name: email_digest
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - DIGEST_RECIPIENT=${DIGEST_RECIPIENT}
      - DIGEST_HOUR=${DIGEST_HOUR:-8}    # Send at 8 AM local time
      - DIGEST_SECRET=${DIGEST_SECRET}   # Used to sign approval emails
      - GRAFANA_URL=http://${PI_LOCAL_IP:-localhost}:3000
      - REDIS_URL=redis://redis:6379
      - TZ=${TIMEZONE:-America/Los_Angeles}
    volumes:
      - ./config:/app/config:ro
    depends_on:
      - redis
    networks:
      - portfolio_net

  # ----------------------------------------------------------
  # Backtest Publisher — reads Freqtrade backtest result JSONs from
  # user_data/backtest_results/ and exposes strategy evaluation
  # metrics on port 9105 for Prometheus/Grafana.
  # Run scripts/run_backtest.sh first to generate result files.
  # ----------------------------------------------------------
  backtest_publisher:
    build: ./services/backtest_publisher
    container_name: backtest_publisher
    restart: unless-stopped
    environment:
      - RESULTS_DIR=/results
      - SCAN_INTERVAL=60
    volumes:
      - ./freqtrade/user_data/backtest_results:/results:ro
    ports:
      - "9105:9105"
    networks:
      - portfolio_net

  # ----------------------------------------------------------
  # Freqtrade Exporter — Prometheus exporter for Freqtrade bot metrics
  # Polls all running bots' REST APIs (momentum, recovery, scalp, freqai),
  # exposes /metrics on port 9101, and mirrors a per-bot summary into Redis
  # so the email_digest can render the strategy table without re-scraping.
  # FreqAI is profile-gated; set FREQTRADE_FREQAI_URL=skip if you don't want
  # the exporter to attempt it when the freqai profile isn't running.
  # ----------------------------------------------------------
  freqtrade_exporter:
    build: ./services/freqtrade_exporter
    container_name: freqtrade_exporter
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      - FREQTRADE_URL=http://freqtrade:8080
      - FREQTRADE_RECOVERY_URL=http://freqtrade_recovery:8083
      - FREQTRADE_SCALP_URL=http://freqtrade_scalp:8081
      - FREQTRADE_FREQAI_URL=http://freqtrade_freqai:8082
      - FREQTRADE_USERNAME=${FREQTRADE_USERNAME:-admin}
      - FREQTRADE_PASSWORD=${FREQTRADE_PASSWORD}
      - SCRAPE_INTERVAL=60
    ports:
      - "9101:9101"
    depends_on:
      - redis
      - freqtrade
      - freqtrade_recovery
      - freqtrade_scalp
    networks:
      - portfolio_net

  # ----------------------------------------------------------
  # DCA Executor — Scheduled dollar-cost averaging into BTC/ETH
  # Runs weekly (Monday 09:00); accelerates buys on >8% dips
  # ----------------------------------------------------------
  dca_executor:
    build: ./services/dca_executor
    container_name: dca_executor
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      - SIMULATION_MODE=${SIMULATION_MODE:-true}
      - COINGECKO_API_KEY=${COINGECKO_API_KEY:-}
      - TZ=${TIMEZONE:-America/Los_Angeles}
    volumes:
      - ./config:/app/config:ro
    depends_on:
      - redis
    networks:
      - portfolio_net

  # ----------------------------------------------------------
  # News Collector — CryptoCompare news aggregator
  # Feeds claude_analyst + email_digest so event explanations are
  # grounded in actual headlines rather than hallucinated causes.
  # (CryptoPanic integration was removed April 2026 when they
  #  discontinued their free Developer API.)
  # ----------------------------------------------------------
  news_collector:
    build: ./services/news_collector
    container_name: news_collector
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      - CRYPTOCOMPARE_API_KEY=${CRYPTOCOMPARE_API_KEY:-}
      - NEWS_POLL_INTERVAL=${NEWS_POLL_INTERVAL:-1800}
      - ASSET_GOVERNOR_URL=http://asset_governor:8090
      - TZ=${TIMEZONE:-America/Los_Angeles}
    depends_on:
      - redis
    networks:
      - portfolio_net

  # ----------------------------------------------------------
  # Freqtrade FreqAI Bot — ML-enhanced strategy (Plan 5)
  # Runs LightGBM classifier trained on RSI/EMA/volume features
  # Deferred — deploy after MomentumStrategy baseline is validated
  # ----------------------------------------------------------
  freqtrade_freqai:
    image: freqtradeorg/freqtrade:stable
    container_name: freqtrade_freqai
    restart: unless-stopped
    profiles: ["freqai"]   # Only starts with: docker compose --profile freqai up
    volumes:
      - freqtrade_freqai_data:/freqtrade/user_data
      - ./freqtrade/strategies:/freqtrade/user_data/strategies
      - ./freqtrade/config_freqai.json:/freqtrade/config.json
      - ./freqtrade/entrypoint.sh:/entrypoint.sh
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    command: ["FreqAIStrategy"]
    environment:
      - TZ=${TIMEZONE:-America/Los_Angeles}
      - FREQTRADE_USERNAME=${FREQTRADE_USERNAME:-admin}
      - FREQTRADE_PASSWORD=${FREQTRADE_PASSWORD}
      - FREQTRADE_FREQAI_JWT_SECRET=${FREQTRADE_FREQAI_JWT_SECRET}
      - FREQTRADE_FREQAI_WS_TOKEN=${FREQTRADE_FREQAI_WS_TOKEN}
      - PI_LOCAL_IP=${PI_LOCAL_IP:-localhost}
    ports:
      - "8082:8082"
    depends_on:
      - redis
    networks:
      - portfolio_net

  # ----------------------------------------------------------
  # Polymarket — Prediction market trading via Claude (Plan 4.5)
  # Currently DISABLED (enabled: false in strategy_config.yaml)
  # Set prediction_markets.enabled: true in strategy_config.yaml to activate
  # ----------------------------------------------------------
  polymarket:
    build: ./services/polymarket
    container_name: polymarket
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - REDIS_URL=redis://redis:6379
      - SIMULATION_MODE=${SIMULATION_MODE:-true}
      - POLYMARKET_API_KEY=${POLYMARKET_API_KEY:-}
      - POLYMARKET_PRIVATE_KEY=${POLYMARKET_PRIVATE_KEY:-}
      - TZ=${TIMEZONE:-America/Los_Angeles}
    volumes:
      - ./config:/app/config:ro
      - polymarket_db:/app/data
    ports:
      - "9104:9104"   # Prometheus metrics
    depends_on:
      - redis
    networks:
      - portfolio_net

  # ----------------------------------------------------------
  # Yield Router — DeFi yield optimization (Plan 4.3)
  # Currently DISABLED (enabled: false in yield_config.yaml)
  # Enable by setting yield_config.yaml enabled: true
  # ----------------------------------------------------------
  yield_router:
    build: ./services/yield_router
    container_name: yield_router
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      - SIMULATION_MODE=${SIMULATION_MODE:-true}
      - POLYGON_RPC_URL=${POLYGON_RPC_URL:-}
      - TZ=${TIMEZONE:-America/Los_Angeles}
    volumes:
      - ./config:/app/config:ro
    ports:
      - "9103:9103"   # Prometheus metrics
    depends_on:
      - redis
    networks:
      - portfolio_net

  # ----------------------------------------------------------
  # Grafana — Portfolio monitoring dashboard
  # ----------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_USERS_ALLOW_SIGN_UP=false
      # SQLite datasource for polymarket.db (whales + positions) and
      # calibration.db. Addresses + row-level data don't fit Prometheus's
      # metric model, so Grafana reads the SQLite files directly.
      - GF_INSTALL_PLUGINS=frser-sqlite-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning   # auto-configure datasource + dashboards
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards   # dashboard JSON files
      - polymarket_db:/var/lib/grafana/sqlite/polymarket:ro           # read-only view of polymarket SQLite DBs
    ports:
      - "3000:3000"
    networks:
      - portfolio_net

  # ----------------------------------------------------------
  # Prometheus — Metrics collection for Grafana
  # ----------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - portfolio_net

volumes:
  redis_data:
  grafana_data:
  prometheus_data:
  analyst_logs:
  executor_logs:
  freqtrade_scalp_data:
  trade_db:
  polymarket_db:
  freqtrade_freqai_data:

networks:
  portfolio_net:
    driver: bridge
